<!doctype html>
<html lang="fr" translate="no" class="notranslate">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover"
    />
    <meta name="google" content="notranslate" />
    <meta http-equiv="Content-Language" content="fr" />
    <meta name="color-scheme" content="light dark" />
    <meta name="supported-color-schemes" content="light dark" />
    <meta name="theme-color" content="#ffffff" />
    <meta name="theme-color" content="#0e0e10" media="(prefers-color-scheme: dark)" />
    <meta http-equiv="refresh" content="0; url=https://bbphysique.github.io/Cartes/" />
    <link rel="canonical" href="https://bbphysique.github.io/Cartes/" />
    <title>Redirection en cours • Cartes</title>

    <link rel="preconnect" href="https://api.fontshare.com" crossorigin />
    <link rel="preconnect" href="https://cdn.fontshare.com" crossorigin />
    <link
      href="https://api.fontshare.com/v2/css?f[]=sentient@400,500&display=swap"
      rel="stylesheet"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Geist+Mono:wght@400;500&family=Geist:wght@400;500;600&display=swap"
      rel="stylesheet"
    />

    <style>
      :root {
        --color-white: #ffffff;
        --color-woodsmoke: #0e0e10;
        --color-grey-mid: #6c6c6d;
        --color-accent: #d22c2c;
        --font-family-base: "Geist", sans-serif;
        --font-family-display: "Sentient", "Geist", sans-serif;
        color-scheme: light;
      }

      @media (prefers-color-scheme: dark) {
        :root {
          --color-white: #0e0e10;
          --color-woodsmoke: #f0f0f0;
          --color-grey-mid: #9a9a9a;
          --color-accent: #cf4949;
          color-scheme: dark;
        }
      }

      * {
        box-sizing: border-box;
      }

      html {
        -webkit-text-size-adjust: 100%;
        text-size-adjust: 100%;
      }

      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        padding: 24px;
        background: var(--color-white);
        color: var(--color-woodsmoke);
        font-family: var(--font-family-base);
        font-size: 17px;
        line-height: 1.6;
      }

      main {
        width: min(100%, 560px);
        text-align: center;
      }

      h1 {
        margin: 0 0 12px;
        font-family: var(--font-family-display);
        font-size: 42px;
        font-weight: 500;
        letter-spacing: 0;
        line-height: 1.08;
      }

      @media (max-width: 560px) {
        h1 {
          font-size: 34px;
        }
      }

      p {
        margin: 0 auto;
        max-width: 34rem;
        color: var(--color-grey-mid);
      }

      a {
        color: var(--color-accent);
        font-weight: 600;
        text-decoration-thickness: 1px;
        text-underline-offset: 4px;
      }
    </style>
  </head>
  <body>
    <main aria-label="Redirection">
      <h1>Redirection en cours</h1>
      <p>
        Si vous lisez ceci, la redirection prend trop de temps.
        <a href="https://bbphysique.github.io/Cartes/">Cliquez ici.</a>
      </p>
    </main>
    <script>
      window.addEventListener("load", () => {
        window.location.replace("https://bbphysique.github.io/Cartes/");
      });
    </script>
  </body>
</html>
